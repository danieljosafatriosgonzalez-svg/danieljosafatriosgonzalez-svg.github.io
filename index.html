<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compound Interest Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 0.5px solid #e0ddd5;
      padding: 2rem;
      width: 100%;
      max-width: 760px;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 2rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
    }

    .stat {
      background: #f5f5f3;
      border-radius: 10px;
      padding: 1rem;
    }

    .stat-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 500;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem 2rem;
      margin-bottom: 2rem;
    }

    .control-row label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }

    .control-row label span {
      font-weight: 500;
      color: #1a1a1a;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #378add;
    }

    .chart-wrap {
      position: relative;
      width: 100%;
      height: 280px;
    }

    .legend {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      font-size: 12px;
      color: #888;
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    @media (max-width: 520px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .stats .stat:last-child { grid-column: span 2; }
      .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Compound Interest Calculator</h1>
    <p class="subtitle">See how your money grows over time</p>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Final balance</div>
        <div class="stat-value" id="stat-final">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Total deposited</div>
        <div class="stat-value" id="stat-deposited">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Interest earned</div>
        <div class="stat-value" id="stat-interest">—</div>
      </div>
    </div>

    <div class="controls">
      <div class="control-row">
        <label>Initial investment <span id="lbl-principal">$5,000</span></label>
        <input type="range" id="principal" min="500" max="50000" step="500" value="5000">
      </div>
      <div class="control-row">
        <label>Annual interest rate <span id="lbl-rate">7%</span></label>
        <input type="range" id="rate" min="1" max="20" step="0.5" value="7">
      </div>
      <div class="control-row">
        <label>Monthly contribution <span id="lbl-monthly">$200</span></label>
        <input type="range" id="monthly" min="0" max="2000" step="50" value="200">
      </div>
      <div class="control-row">
        <label>Time horizon <span id="lbl-years">20 years</span></label>
        <input type="range" id="years" min="1" max="50" step="1" value="20">
      </div>
    </div>

    <div class="chart-wrap">
      <canvas id="ciChart"></canvas>
    </div>

    <div class="legend">
      <span><span class="dot" style="background:#378add;"></span>Total balance</span>
      <span><span class="dot" style="background:#b5d4f4;"></span>Amount deposited</span>
    </div>
  </div>

  <script>
    const fmt = n => '$' + Math.round(n).toLocaleString();

    function calcData(principal, monthly, rate, years) {
      const r = rate / 100 / 12;
      const labels = [], balances = [], deposits = [];
      for (let y = 0; y <= years; y++) {
        const months = y * 12;
        const bal = principal * Math.pow(1 + r, months) +
          (r > 0 ? monthly * (Math.pow(1 + r, months) - 1) / r : monthly * months);
        labels.push(y === 0 ? 'Now' : 'Year ' + y);
        balances.push(Math.round(bal));
        deposits.push(Math.round(principal + monthly * months));
      }
      return { labels, balances, deposits };
    }

    const ctx = document.getElementById('ciChart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: { labels: [], datasets: [
        { label: 'Total balance', data: [], borderColor: '#378add', backgroundColor: 'rgba(55,138,221,0.15)', fill: true, tension: 0.3, pointRadius: 2 },
        { label: 'Amount deposited', data: [], borderColor: '#b5d4f4', backgroundColor: 'rgba(181,212,244,0.15)', fill: true, tension: 0.3, pointRadius: 2 }
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.parsed.y) }
        }},
        scales: {
          x: { grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { maxTicksLimit: 11, color: '#aaa' } },
          y: { grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { color: '#aaa', callback: v => v >= 1000000 ? '$' + (v/1000000).toFixed(1) + 'M' : '$' + (v/1000).toFixed(0) + 'k' } }
        }
      }
    });

    function update() {
      const p = +document.getElementById('principal').value;
      const m = +document.getElementById('monthly').value;
      const r = +document.getElementById('rate').value;
      const y = +document.getElementById('years').value;

      document.getElementById('lbl-principal').textContent = fmt(p);
      document.getElementById('lbl-monthly').textContent = fmt(m);
      document.getElementById('lbl-rate').textContent = r + '%';
      document.getElementById('lbl-years').textContent = y + ' year' + (y !== 1 ? 's' : '');

      const { labels, balances, deposits } = calcData(p, m, r, y);
      const finalBal = balances[balances.length - 1];
      const finalDep = deposits[deposits.length - 1];

      document.getElementById('stat-final').textContent = fmt(finalBal);
      document.getElementById('stat-deposited').textContent = fmt(finalDep);
      document.getElementById('stat-interest').textContent = fmt(finalBal - finalDep);

      chart.data.labels = labels;
      chart.data.datasets[0].data = balances;
      chart.data.datasets[1].data = deposits;
      chart.update('none');
    }

    ['principal', 'monthly', 'rate', 'years'].forEach(id => {
      document.getElementById(id).addEventListener('input', update);
    });
    update();
  </script>
</body>
</html>
